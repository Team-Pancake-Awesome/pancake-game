name: Auto Assign & Discord Notify

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Auto-assign PR
        uses: pozil/auto-assign-issue@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: 5EUS,AaronCII,bmike3,sabrina714,wfrasher,feltcutemightdelete
          numOfAssignee: 2

      - name: Fetch PR metadata (assignees/reviewers)
        id: prmeta
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const githubToDiscord = JSON.parse(process.env.ASSIGNEE_MAP || '{}');
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });

            const discordAssignees = (pr.assignees ?? []).map(a => githubToDiscord[a.login] || a.login).join(', ') || 'None';
            const discordReviewers = (pr.requested_reviewers ?? []).map(r => githubToDiscord[r.login] || r.login).join(', ') || 'None';

            const teams = (pr.requested_teams ?? []).map(t => t.name).join(', ') || 'None';

            // Build the embed JSON
            const embed = [{
              title: `PR #${pr.number}: ${pr.title}`,
              url: pr.html_url,
              description: pr.body || 'No description provided.',
              color: 3447003,
              fields: [
                { name: "Author", value: pr.user?.login || 'unknown', inline: true },
                { name: "Repo", value: `${owner}/${repo}`, inline: true },
                { name: "Assignees", value: discordAssignees, inline: false },
                { name: "Requested Reviewers", value: discordReviewers, inline: false },
                { name: "Requested Teams", value: teams, inline: false }
              ]
            }];

            core.setOutput('discord_embeds', JSON.stringify(embed));

        env:
          ASSIGNEE_MAP: ${{ vars.ASSIGNEE_MAP }}  

      - name: Notify Discord
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USERNAME: "GitHub Bot"
          DISCORD_AVATAR: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          DISCORD_EMBEDS: ${{ steps.prmeta.outputs.discord_embeds }}
        with:
          args: "@everyone New PR opened!"