name: Auto Assign & Discord Notify

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Auto-assign PR
        uses: pozil/auto-assign-issue@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: 5EUS,AaronCII,bmike3,sabrina714,wfrasher,feltcutemightdelete
          numOfAssignee: 2

      - name: Fetch PR metadata (assignees/reviewers)
        id: prmeta
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const githubToDiscord = JSON.parse(process.env.ASSIGNEE_MAP || '{}');
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });

            const discordAssignees = (pr.assignees ?? []).map(a => githubToDiscord[a.login] || a.login).join(', ') || 'None';
            const discordReviewers = (pr.requested_reviewers ?? []).map(r => githubToDiscord[r.login] || r.login).join(', ') || 'None';

            core.setOutput('number', pr.number);
            core.setOutput('author', pr.user?.login || 'unknown');
            core.setOutput('html_url', pr.html_url);
            core.setOutput('discord_assignees', discordAssignees);
            core.setOutput('discord_reviewers', discordReviewers);

      - name: Build Discord message
        id: message
        run: |
          MSG=":new: PR #${{ steps.prmeta.outputs.number }} opened by ${{ steps.prmeta.outputs.author }}"
          MSG="${MSG}\n**URL:** ${{ steps.prmeta.outputs.html_url }}"
          MSG="${MSG}\n**Assignees:** ${{ steps.prmeta.outputs.discord_assignees }}"
          MSG="${MSG}\n**Reviewers:** ${{ steps.prmeta.outputs.discord_reviewers }}"

          echo "DISCORD_MESSAGE<<EOF" >> "$GITHUB_ENV"
          echo "${MSG}" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Notify Discord
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MESSAGE: ${{ env.DISCORD_MESSAGE }}
        with:
          args: "{{ DISCORD_MESSAGE }}"