name: Auto Assign & Discord Notify

on:
  pull_request:
    types: [opened]

jobs:
  assign-and-notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      # Step 1: Auto-assign PR
      - name: Auto-assign PR
        uses: pozil/auto-assign-issue@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: 5EUS,AaronCII,bmike3,sabrina714,wfrasher,feltcutemightdelete
          numOfAssignee: 2

      # Step 2: Fetch PR metadata and map GitHub usernames -> Discord mentions
      - name: Fetch PR metadata (assignees/reviewers)
        id: prmeta
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Map GitHub usernames to Discord mentions
            const githubToDiscord = JSON.parse(process.env.ASSIGNEE_MAP || '{}');

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });

            const assignees = (pr.assignees ?? []).map(a => a.login).join(', ') || 'None';
            const reviewers = (pr.requested_reviewers ?? []).map(r => r.login).join(', ') || 'None';
            const teams = (pr.requested_teams ?? []).map(t => t.name).join(', ') || 'None';

            const discordAssignees = (pr.assignees ?? []).map(a => githubToDiscord[a.login] || a.login).join(', ') || 'None';
            const discordReviewers = (pr.requested_reviewers ?? []).map(r => githubToDiscord[r.login] || r.login).join(', ') || 'None';

            core.setOutput('assignees', assignees);
            core.setOutput('reviewers', reviewers);
            core.setOutput('reviewer_teams', teams);
            core.setOutput('discord_assignees', discordAssignees);
            core.setOutput('discord_reviewers', discordReviewers);
            core.setOutput('html_url', pr.html_url);
            core.setOutput('title', pr.title);
            core.setOutput('number', String(pr.number));
            core.setOutput('author', pr.user?.login ?? 'unknown');
            core.setOutput('body', pr.body ?? '');

      # Step 3: Export outputs to environment variables for Discord action
      - name: Export Discord variables
        run: |
          echo "DISCORD_ASSIGNEES=${{ steps.prmeta.outputs.discord_assignees }}" >> "$GITHUB_ENV"
          echo "DISCORD_REVIEWERS=${{ steps.prmeta.outputs.discord_reviewers }}" >> "$GITHUB_ENV"

      # Step 4: Notify Discord
      - name: Notify Discord
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USERNAME: "GitHub Bot"
          DISCORD_AVATAR: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
        with:
          args: |
            :new: PR **#{{ EVENT_PAYLOAD.pull_request.number }}** opened by **{{ EVENT_PAYLOAD.pull_request.user.login }}**
            **URL:** {{ EVENT_PAYLOAD.pull_request.html_url }}
            **Assignees:** {{ env.DISCORD_ASSIGNEES }}
            **Reviewers:** {{ env.DISCORD_REVIEWERS }}